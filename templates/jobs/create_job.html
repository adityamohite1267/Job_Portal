{% extends "base.html" %} {% block content %}
<div class="container card">
  <h2>Create Job</h2>
  <form method="post">
    {% csrf_token %} {{ form.as_p }}
    
    <button type="submit" class="btn btn-primary">Post Job</button>
  </form>
</div>
{% endblock %}

{% block extra_js %}
<script>
    $(document).ready(function() {
        $('.select2').select2({
            placeholder: "Select required skills",
            allowClear: true,
            width: '100%'
        });
    });
</script>
{% endblock %}
