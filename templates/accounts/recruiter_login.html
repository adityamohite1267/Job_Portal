{% extends "base.html" %}

{% block content %}
<div class="container">
    <h2>Recruiter Login</h2>
    <form method="post" novalidate> <!-- novalidate use because we handle validate in backend in form-->
        {% csrf_token %}
        {{form.as_p}}
        <button type="submit" class="btn btn-primary">Login</button>
    </form>
</div>
{% endblock %}
